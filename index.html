<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viðreisn · Fylgis- og árangursmælaborð</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EE;
    --paper-2:#F4ECE0;
    --ink:#211B14;
    --ink-soft:#5B5246;
    --line:#E3D8C7;
    --orange:#F26B1D;          /* Viðreisn-appelsínugulur */
    --orange-deep:#C9530F;
    --orange-soft:#FBE3CF;
    --teal:#2E6E6A;
    --good:#3C7A4E;
    --warn:#B87514;
    --opp:#8A4B2A;
    --shadow:0 1px 2px rgba(33,27,20,.05),0 8px 24px rgba(33,27,20,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 100% -10%, rgba(242,107,29,.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(46,110,106,.06), transparent 55%),
      var(--paper);
    color:var(--ink);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* ---------- Header ---------- */
  header.top{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(251,246,238,.9), rgba(251,246,238,.6));
    backdrop-filter:blur(6px);
    position:sticky;top:0;z-index:50;
  }
  .top-inner{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:18px 24px;max-width:1180px;margin:0 auto;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .dot{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 32% 28%, #ff8a3c, var(--orange) 60%, var(--orange-deep));box-shadow:0 4px 14px rgba(242,107,29,.4)}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.28rem;letter-spacing:-.01em;line-height:1.05}
  .brand .sub{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .updated{font-size:.78rem;color:var(--ink-soft);text-align:right}
  .updated b{color:var(--ink);font-weight:600}
  .btn{font-family:inherit;font-size:.78rem;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:999px;cursor:pointer;transition:.18s}
  .btn:hover{border-color:var(--orange);color:var(--orange-deep)}

  /* ---------- Nav ---------- */
  nav.tabs{position:sticky;top:69px;z-index:40;background:rgba(251,246,238,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  .tabs-inner{display:flex;gap:4px;max-width:1180px;margin:0 auto;padding:0 16px;overflow-x:auto}
  .tab{font-family:inherit;font-size:.86rem;font-weight:600;color:var(--ink-soft);background:none;border:none;border-bottom:2px solid transparent;padding:14px 14px;cursor:pointer;white-space:nowrap;transition:.15s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--orange-deep);border-bottom-color:var(--orange)}

  /* ---------- Sections ---------- */
  section.panel{display:none;padding:38px 0 60px;animation:fade .4s ease}
  section.panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .eyebrow{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--orange-deep);font-weight:700;margin-bottom:8px}
  h2.sec{font-family:'Fraunces',serif;font-weight:600;font-size:1.9rem;letter-spacing:-.02em;margin-bottom:6px}
  .lede{color:var(--ink-soft);max-width:62ch;margin-bottom:26px}

  /* ---------- Cards / grid ---------- */
  .grid{display:grid;gap:18px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:860px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
  .card.flush{padding:0;overflow:hidden}

  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .n{font-family:'Fraunces',serif;font-size:2.5rem;font-weight:600;line-height:1;letter-spacing:-.02em}
  .stat .n small{font-size:1.1rem;color:var(--ink-soft);font-weight:500}
  .stat .lbl{font-size:.82rem;color:var(--ink-soft);font-weight:500}
  .stat .meta{font-size:.72rem;color:var(--ink-soft);margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
  .accent{color:var(--orange-deep)}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:999px}
  .b-maj{background:#E7F0E7;color:var(--good)}
  .b-jun{background:var(--orange-soft);color:var(--orange-deep)}
  .b-opp{background:#F3E6DC;color:var(--opp)}
  .b-todo{background:#EFEFEA;color:var(--ink-soft);border:1px dashed var(--line)}
  .b-gov{background:#E4EEED;color:var(--teal)}

  /* minister cards */
  .min{display:flex;gap:16px;align-items:flex-start}
  .min .av{width:46px;height:46px;border-radius:12px;flex:0 0 46px;display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:600;color:#fff;font-size:1.1rem;background:linear-gradient(140deg,var(--orange),var(--orange-deep))}
  .min h3{font-size:1.02rem;font-weight:700;letter-spacing:-.01em}
  .min .role{color:var(--orange-deep);font-weight:600;font-size:.86rem;margin-bottom:4px}
  .min p{font-size:.84rem;color:var(--ink-soft)}

  /* bill list */
  .bill{display:flex;gap:16px;padding:18px 0;border-top:1px solid var(--line)}
  .bill:first-child{border-top:none}
  .bill .yr{font-family:'Fraunces',serif;font-weight:600;color:var(--orange-deep);font-size:.95rem;flex:0 0 86px}
  .bill h3{font-size:1.02rem;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
  .bill p{font-size:.86rem;color:var(--ink-soft)}
  .bill .tags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}

  /* municipality table */
  .muni{border-top:1px solid var(--line);padding:18px 0}
  .muni:first-child{border-top:none}
  .muni-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .muni-head h3{font-family:'Fraunces',serif;font-size:1.18rem;font-weight:600;letter-spacing:-.01em}
  .muni-meta{display:flex;gap:24px;flex-wrap:wrap;margin-top:10px;font-size:.85rem}
  .muni-meta div span{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:1px}
  .muni-meta div b{font-weight:600}
  .seats{display:inline-flex;gap:3px;vertical-align:middle;margin-left:6px}
  .seat{width:9px;height:14px;border-radius:2px;background:var(--line)}
  .seat.on{background:var(--orange)}
  .note{font-size:.85rem;color:var(--ink-soft);margin-top:10px;background:var(--paper-2);border-radius:10px;padding:10px 12px}
  .aherslur{margin-top:12px;border-left:3px solid var(--orange);background:linear-gradient(135deg,var(--orange-soft),#fff);border-radius:0 12px 12px 0;padding:14px 16px}
  .aherslur .ah-title{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--orange-deep);font-weight:700;margin-bottom:8px}
  .aherslur ul{margin:0;padding-left:18px}
  .aherslur li{font-size:.86rem;margin-bottom:5px}
  .aherslur li:last-child{margin-bottom:0}

  /* chart */
  .bars{display:flex;align-items:flex-end;gap:24px;height:230px;padding:14px 6px 0;border-bottom:2px solid var(--ink)}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .bar{width:62%;max-width:64px;border-radius:8px 8px 0 0;background:linear-gradient(180deg,var(--orange),var(--orange-deep));position:relative;transition:height 1s cubic-bezier(.2,.8,.2,1)}
  .bar .v{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem}
  .bar.q{background:repeating-linear-gradient(45deg,var(--line),var(--line) 6px,#ece2d2 6px,#ece2d2 12px)}
  .bar.q .v{color:var(--ink-soft)}
  .bar-lbl{margin-top:10px;font-size:.8rem;font-weight:600;text-align:center}
  .bar-sub{font-size:.7rem;color:var(--ink-soft)}

  .callout{background:linear-gradient(135deg,var(--orange-soft),#fff);border:1px solid var(--orange-soft);border-radius:16px;padding:20px 22px;margin:8px 0 26px}
  .callout h3{font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;margin-bottom:4px}
  .callout p{font-size:.88rem;color:var(--ink-soft)}

  .src{font-size:.8rem;color:var(--ink-soft);padding:10px 0;border-top:1px solid var(--line);display:flex;gap:12px}
  .src .d{flex:0 0 92px;font-weight:600;color:var(--ink)}
  .src a{color:var(--orange-deep);text-decoration:none;word-break:break-word}
  .src a:hover{text-decoration:underline}

  .disclaimer{font-size:.82rem;color:var(--ink-soft);background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-top:10px}
  footer{border-top:1px solid var(--line);padding:24px 0;font-size:.78rem;color:var(--ink-soft);text-align:center}

  @media print{
    nav.tabs,header.top .btn{display:none}
    section.panel{display:block!important;page-break-inside:avoid}
    body{background:#fff}
  }
</style>
</head>

const TABS = [
  {id:"yfirlit", label:"Yfirlit"},
  {id:"fylgi", label:"Fylgi"},
  {id:"rikisstjorn", label:"Ríkisstjórn"},
  {id:"thingmal", label:"Þingmál"},
  {id:"sveitir", label:"Sveitarstjórnir"},
  {id:"heimildir", label:"Heimildir"}
];

const statusMeta = {
  maj:{cls:"b-maj", txt:"Meirihluti"},
  jun:{cls:"b-jun", txt:"Samstarfsaðili"},
  opp:{cls:"b-opp", txt:"Minnihluti"},
  todo:{cls:"b-todo", txt:"Útfæra"}
};

function seatsDots(on, total){
  on = on || 0;
  let h = '<span class="seats">';
  for(let i=0;i<total;i++) h += `<span class="seat ${i<on?'on':''}"></span>`;
  return h+'</span>';
}

function render(){
  // tabs
  document.getElementById('tabbar').innerHTML = TABS.map((t,i)=>
    `<button class="tab ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');

  const m = document.getElementById('main');
  m.innerHTML = panelYfirlit()+panelFylgi()+panelRikisstjorn()+panelThingmal()+panelSveitir()+panelHeimildir();

  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('p-'+btn.dataset.tab).classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});
      if(btn.dataset.tab==='fylgi') animateBars();
    });
  });
  animateBars();
}

/* ---- Fylgi ---- */
function panelFylgi(){
  const n = DATA.national;
  const maxSeats = Math.max(...n.seatsByMuni.map(s=>s.seats||0),3);
  const bars = n.seatsByMuni.map(s=>{
    const isQ = s.q;
    const h = isQ?28:((s.seats/maxSeats)*100);
    return `<div class="bar-col">
      <div class="bar ${isQ?'q':''}" data-h="${h}" style="height:0">
        <span class="v">${isQ?'?':s.seats}</span>
      </div>
      <div class="bar-lbl">${s.name}</div>
      <div class="bar-sub">af ${s.total}</div>
    </div>`;
  }).join('');

  const issues = DATA.issues.map(i=>`
    <div class="bill" style="border-top:1px solid var(--line)">
      <div class="yr" style="flex:0 0 0"></div>
      <div>
        <h3>${i.topic}</h3>
        <p>${i.note}</p>
        ${i.val?`<div class="tags"><span class="badge b-gov">${i.val}</span></div>`:''}
      </div>
    </div>`).join('');

  return `<section class="panel" id="p-fylgi">
    <div class="eyebrow">Fylgiskannanir</div>
    <h2 class="sec">Fylgi á landsvísu og í sveitarfélögum</h2>
    <p class="lede">${n.context}</p>
    <div class="grid g3" style="margin-bottom:30px">
      <div class="card stat" style="grid-column:span 1">
        <div class="n">${n.headline}</div>
        <div class="lbl">${n.headlineLabel}</div>
        <div class="meta">${n.headlineMeta}</div>
      </div>
      <div class="card" style="grid-column:span 2">
        <div class="eyebrow" style="margin-bottom:4px">Kjörnir fulltrúar Viðreisnar · sveitarstjórnarkosningar 16. maí 2026</div>
        <div class="bars">${bars}</div>
        <p class="bar-sub" style="margin-top:12px">Skástrikaðar súlur = úrslit ekki staðfest í þessu mælaborði enn.</p>
      </div>
    </div>
    <div class="eyebrow">Kannanir eftir málefnum</div>
    <h2 class="sec" style="font-size:1.4rem">Málefnamælingar — umgjörð til útfyllingar</h2>
    <p class="lede">Hér er rammi fyrir reglulegar málefnakannanir. Fylltu inn nýjustu tölur jafnóðum (Maskína, Gallup þjóðarpúls, Prósent).</p>
    <div class="card">${issues}</div>
  </section>`;
}

  return `<section class="panel" id="p-thingmal">

function panelSveitir(){
  const list = DATA.munis.map(mu=>{
    const sm = statusMeta[mu.status];
    const dots = mu.seats!=null ? seatsDots(mu.seats, mu.total) : '';
    return `<div class="muni">
      <div class="muni-head">
        <h3>${mu.name} ${dots}</h3>
        <span class="badge ${sm.cls}">${sm.txt}</span>
      </div>
      <div class="muni-meta">
        <div><span>Fulltrúar</span><b>${mu.voteNote}</b></div>
        <div><span>Oddviti</span><b>${mu.oddviti}</b></div>
        ${mu.fulltrui2 ? `<div><span>2. fulltrúi</span><b>${mu.fulltrui2}</b></div>` : ''}
        <div><span>Embætti</span><b>${mu.embætti}</b></div>
        <div><span>Meirihluti</span><b>${mu.coalition}</b></div>
      </div>
      <div class="note">${mu.detail}</div>
      ${mu.aherslur && mu.aherslur.length ? `<div class="aherslur"><div class="ah-title">${mu.aherslurTitle || 'Úr málefnasamningi'}</div><ul>${mu.aherslur.map(a=>`<li>${a}</li>`).join('')}</ul></div>` : ''}
    </div>`;
  }).join('');
  return `<section class="panel" id="p-sveitir">
    <div class="eyebrow">Sveitarstjórnarkosningar · 16. maí 2026</div>
    <h2 class="sec">Staða Viðreisnar í sveitarfélögunum</h2>
    <p class="lede">Sundurliðun eftir þeim átta sveitarfélögum sem þú sinnir. Fjögur eru staðfest hér; fjögur bíða útfyllingar.</p>
    <div class="card">${list}</div>
  </section>`;
}

/* ---- Heimildir ---- */
function panelHeimildir(){
  const list = DATA.sources.map(s=>`<div class="src"><div class="d">${s.d}</div><a href="${s.u}" target="_blank" rel="noopener">${s.t}</a></div>`).join('');
  return `<section class="panel" id="p-heimildir">
    <div class="eyebrow">Heimildir &amp; aðferð</div>
    <h2 class="sec">Hvaðan koma tölurnar</h2>
    <p class="lede">Allar tölur eru frá opinberum og fréttaheimildum, með dagsetningu. Mælaborðið er augnabliksmynd — fylgi og embætti breytast.</p>
    <div class="card" style="margin-bottom:18px">${list}</div>
    <div class="disclaimer">
      <b>Aðferð:</b> Fylgistölur eru frá einstökum könnunum tiltekinna fyrirtækja og endurspegla ekki vegið meðaltal. Sveitarstjórnartölur miðast við úrslit 16. maí 2026 og meirihlutamyndanir sem tilkynntar voru síðustu vikuna í maí. Öll átta sveitarfélögin sem hér eru rakin eru staðfest. Uppfærðu <code>DATA</code>-hlutann í skránni til að halda mælaborðinu lifandi.
    </div>
  </section>`;
}

function animateBars(){
  setTimeout(()=>{
    document.querySelectorAll('#p-fylgi .bar').forEach(b=>{
      b.style.height = b.dataset.h+'%';
    });
  },80);
}

render();
</script>
</body>
