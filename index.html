<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viðreisn · Fylgis- og árangursmælaborð</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EE;
    --paper-2:#F4ECE0;
    --ink:#211B14;
    --ink-soft:#5B5246;
    --line:#E3D8C7;
    --orange:#F26B1D;          /* Viðreisn-appelsínugulur */
    --orange-deep:#C9530F;
    --orange-soft:#FBE3CF;
    --teal:#2E6E6A;
    --good:#3C7A4E;
    --warn:#B87514;
    --opp:#8A4B2A;
    --shadow:0 1px 2px rgba(33,27,20,.05),0 8px 24px rgba(33,27,20,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 100% -10%, rgba(242,107,29,.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(46,110,106,.06), transparent 55%),
      var(--paper);
    color:var(--ink);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}

  /* ---------- Header ---------- */
  header.top{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(251,246,238,.9), rgba(251,246,238,.6));
    backdrop-filter:blur(6px);
    position:sticky;top:0;z-index:50;
  }
  .top-inner{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:18px 24px;max-width:1180px;margin:0 auto;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{height:38px;width:auto;display:block;border-radius:6px;box-shadow:0 4px 14px rgba(242,107,29,.35)}
  .brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.28rem;letter-spacing:-.01em;line-height:1.05}
  .brand .sub{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .updated{font-size:.78rem;color:var(--ink-soft);text-align:right}
  .updated b{color:var(--ink);font-weight:600}
  .btn{font-family:inherit;font-size:.78rem;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:999px;cursor:pointer;transition:.18s}
  .btn:hover{border-color:var(--orange);color:var(--orange-deep)}

  /* ---------- Nav ---------- */
  nav.tabs{position:sticky;top:69px;z-index:40;background:rgba(251,246,238,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line)}
  .tabs-inner{display:flex;gap:4px;max-width:1180px;margin:0 auto;padding:0 16px;overflow-x:auto}
  .tab{font-family:inherit;font-size:.86rem;font-weight:600;color:var(--ink-soft);background:none;border:none;border-bottom:2px solid transparent;padding:14px 14px;cursor:pointer;white-space:nowrap;transition:.15s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--orange-deep);border-bottom-color:var(--orange)}

  /* ---------- Sections ---------- */
  section.panel{display:none;padding:38px 0 60px;animation:fade .4s ease}
  section.panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .eyebrow{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--orange-deep);font-weight:700;margin-bottom:8px}
  h2.sec{font-family:'Fraunces',serif;font-weight:600;font-size:1.9rem;letter-spacing:-.02em;margin-bottom:6px}
  .lede{color:var(--ink-soft);max-width:62ch;margin-bottom:26px}

  /* ---------- Cards / grid ---------- */
  .grid{display:grid;gap:18px}
  .g2{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .gstat{grid-template-columns:repeat(auto-fit,minmax(185px,1fr))}
  @media(max-width:860px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
  .card.flush{padding:0;overflow:hidden}

  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .n{font-family:'Fraunces',serif;font-size:2.5rem;font-weight:600;line-height:1;letter-spacing:-.02em}
  .stat .n small{font-size:1.1rem;color:var(--ink-soft);font-weight:500}
  .stat .lbl{font-size:.82rem;color:var(--ink-soft);font-weight:500}
  .stat .meta{font-size:.72rem;color:var(--ink-soft);margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
  .accent{color:var(--orange-deep)}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:999px}
  .b-maj{background:#E7F0E7;color:var(--good)}
  .b-jun{background:var(--orange-soft);color:var(--orange-deep)}
  .b-opp{background:#F3E6DC;color:var(--opp)}
  .b-todo{background:#EFEFEA;color:var(--ink-soft);border:1px dashed var(--line)}
  .b-gov{background:#E4EEED;color:var(--teal)}

  /* minister cards */
  .min{display:flex;gap:16px;align-items:flex-start}
  .min .av{width:46px;height:46px;border-radius:12px;flex:0 0 46px;display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:600;color:#fff;font-size:1.1rem;background:linear-gradient(140deg,var(--orange),var(--orange-deep))}
  .min h3{font-size:1.02rem;font-weight:700;letter-spacing:-.01em}
  .min .role{color:var(--orange-deep);font-weight:600;font-size:.86rem;margin-bottom:4px}
  .min p{font-size:.84rem;color:var(--ink-soft)}
  .nefndir{list-style:none;margin:10px 0 0;padding:0;display:flex;flex-direction:column;gap:0}
  .nefndir li{font-size:.82rem;display:flex;justify-content:space-between;align-items:baseline;gap:12px;border-top:1px dashed var(--line);padding:5px 0}
  .nefndir li:first-child{border-top:none}
  .nefndir li em{font-style:normal;color:var(--ink-soft);font-size:.74rem;white-space:nowrap}
  .nefndir li em.lead{color:var(--orange-deep);font-weight:700}
  .mp-radh{font-size:.82rem;color:var(--orange-deep);font-weight:600;margin-top:10px;background:var(--orange-soft);border-radius:8px;padding:6px 10px;display:inline-block}
  .tm-group{margin-top:22px}
  .tm-ghead{display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid var(--orange);padding-bottom:6px}
  .tm-ghead h3{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:600;letter-spacing:-.01em}
  .tm-count{font-size:.74rem;color:var(--ink-soft);white-space:nowrap}
  .tm-gsub{font-size:.8rem;color:var(--orange-deep);font-weight:600;margin:4px 0 6px}
  .sm-roles{font-size:.78rem;color:var(--ink-soft);margin:0 0 8px}
  .sm-item{cursor:default}
  .tm-type.sm-ok{background:#e3f0e6;color:#2f7d4f}
  .tm-type.sm-pend{background:var(--paper-2);color:var(--ink-soft)}
  .tm-list{display:flex;flex-direction:column}
  .tm-item{display:grid;grid-template-columns:104px 1fr auto;gap:12px;align-items:baseline;padding:8px 6px;border-bottom:1px solid var(--line);text-decoration:none;color:var(--ink);transition:background .12s}
  .tm-item:hover{background:var(--paper-2)}
  .tm-type{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 6px;border-radius:6px;text-align:center;white-space:nowrap}
  .tm-frv{background:var(--orange-soft);color:var(--orange-deep)}
  .tm-thal{background:#E2ECEC;color:#266360}
  .tm-log{background:#211B14;color:#FBF6EE}
  .tm-thingsep{height:1px;background:linear-gradient(90deg,var(--orange),transparent);margin:28px 0 0}
  .ch{width:100%;height:auto;display:block}
  .ch-grid{stroke:var(--line);stroke-width:1}
  .ch-ylab{fill:var(--ink-soft);font-size:11px;text-anchor:end;font-family:'Hanken Grotesk',sans-serif}
  .ch-xlab{fill:var(--ink);font-size:12px;text-anchor:middle;font-weight:600;font-family:'Hanken Grotesk',sans-serif}
  .ch-xsub{fill:var(--ink-soft);font-size:10px;text-anchor:middle;font-family:'Hanken Grotesk',sans-serif}
  .ch-val{fill:var(--orange-deep);font-size:12px;text-anchor:middle;font-weight:700;font-family:'Hanken Grotesk',sans-serif}
  .ch-area{fill:var(--orange-soft);opacity:.5}
  .ch-line{fill:none;stroke:var(--orange);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round}
  .ch-pt{fill:#fff;stroke:var(--orange);stroke-width:2.5}
  .ch-pt-e{fill:var(--orange);stroke:var(--orange-deep)}
  .sf-table{width:100%;border-collapse:collapse;font-size:.88rem}
  .sf-table th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);border-bottom:2px solid var(--orange);padding:0 8px 6px}
  .sf-table td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  .sf-name{font-weight:600;white-space:nowrap}
  .sf-pct{font-weight:700;color:var(--orange-deep);white-space:nowrap}
  .sf-note{color:var(--ink-soft);font-size:.82rem}
  .sf-delta{font-weight:700;white-space:nowrap;font-size:.84rem}
  .sf-delta.up{color:#2f7d4f}
  .sf-delta.down{color:#b03a2e}
  .sf-seat{display:block;font-weight:500;font-size:.72rem;color:var(--ink-soft)}
  .esb-bar{display:flex;height:30px;border-radius:8px;overflow:hidden;margin:12px 0 4px;font-size:.72rem;font-weight:700}
  .esb-seg{display:flex;align-items:center;justify-content:center;color:#fff;min-width:0;white-space:nowrap}
  .esb-seg.against{background:#3f3a33}
  .esb-seg.for{background:var(--orange)}
  .esb-seg.neutral{background:#cdbda6;color:var(--ink)}
  .esb-seg span{padding:0 6px;overflow:hidden;text-overflow:ellipsis}
  .fund-table{width:100%;border-collapse:collapse;font-size:.84rem}
  .fund-table th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);padding:0 8px 8px;font-weight:700}
  .fund-table td{padding:8px;border-top:1px solid var(--line);vertical-align:top;min-width:120px}
  .fund-wk{white-space:nowrap;color:var(--ink)!important;border-top:1px solid var(--line)}
  .fund-chip{display:inline-block;background:var(--orange-soft);color:var(--orange-deep);font-weight:600;border-radius:6px;padding:4px 9px;margin:2px 3px 2px 0;font-size:.8rem;white-space:nowrap}
  .fund-time{display:block;font-weight:500;font-size:.68rem;color:var(--ink-soft);margin-top:1px}
  .vl-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:640px){.vl-stats{grid-template-columns:1fr}}
  .vl-stat{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:16px}
  .vl-stat .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
  .vl-stat .pct{font-family:Fraunces,serif;font-size:1.9rem;font-weight:600;color:var(--orange-deep);line-height:1}
  .vl-stat .sub{font-size:.8rem;color:var(--ink-soft);margin-top:4px}
  .vl-link{display:inline-block;background:var(--orange);color:#fff;font-weight:600;text-decoration:none;padding:11px 18px;border-radius:10px;font-size:.9rem}
  .vl-link:hover{background:var(--orange-deep)}
  .spa-big{font-family:Fraunces,serif;font-size:2.4rem;font-weight:600;color:var(--orange-deep);line-height:1}
  .spa-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:.85rem}
  .spa-row .f{flex:1;font-weight:600;min-width:0}
  .spa-row .d{color:var(--ink-soft);font-size:.78rem;white-space:nowrap}
  .spa-row .v{font-weight:700;width:52px;text-align:right}
  .spa-row .w{color:var(--ink-soft);font-size:.74rem;width:78px;text-align:right;white-space:nowrap}
  .rv-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.82rem}
  .rv-name{flex:0 0 150px;text-align:right;line-height:1.15}
  .rv-name.v{color:var(--orange-deep);font-weight:700}
  .rv-role{display:block;font-weight:400;font-size:.66rem;color:var(--ink-soft)}
  .rv-track{flex:1;display:flex;align-items:center;min-width:60px}
  .rv-neg{flex:1;display:flex;justify-content:flex-end}
  .rv-pos{flex:1;display:flex;justify-content:flex-start;border-left:2px solid var(--line)}
  .rv-bar-neg{height:14px;background:#6b6258;border-radius:3px 0 0 3px}
  .rv-bar-pos{height:14px;background:var(--orange);border-radius:0 3px 3px 0}
  .rv-net{flex:0 0 44px;text-align:right;font-weight:700;font-size:.8rem}
  .rv-net.pos{color:#2f7d4f}
  .rv-net.neg{color:#b03a2e}
  .rv-legend{display:flex;gap:16px;flex-wrap:wrap;font-size:.74rem;color:var(--ink-soft);margin-bottom:14px}
  .rv-sw{display:inline-block;width:11px;height:11px;border-radius:2px;vertical-align:-1px;margin-right:4px}
  .rv-sw.neg{background:#6b6258}
  .rv-sw.pos{background:var(--orange)}
  .fund-empty{color:var(--line)}
  @media(max-width:680px){.sf-note{display:none}}
  .sokn-row{padding:11px 0;border-bottom:1px solid var(--line)}
  .sokn-row:last-child{border-bottom:none}
  .sokn-p{font-weight:600;font-size:.9rem;margin-bottom:6px}
  .sokn-row.hi .sokn-p{color:var(--orange-deep)}
  .sokn-metric{display:flex;align-items:center;gap:8px;margin:3px 0}
  .sokn-tag{font-size:.72rem;color:var(--ink-soft);width:42px;flex:0 0 42px}
  .sokn-track{flex:1;height:14px;background:var(--paper-2);border-radius:7px;overflow:hidden}
  .sokn-fill{height:100%;border-radius:7px}
  .sokn-fill.v2{background:var(--orange)}
  .sokn-fill.v3{background:var(--orange-soft)}
  .sokn-row.hi .sokn-fill.v2{background:var(--orange-deep)}
  .sokn-val{font-size:.8rem;font-weight:700;width:40px;flex:0 0 40px;text-align:right}
  .mal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .mal-card{background:var(--paper-2);border-radius:10px;padding:14px 16px}
  .mal-k{font-weight:700;color:var(--orange-deep);margin-bottom:8px;font-size:.92rem}
  .mal-list{margin:0;padding-left:18px}
  .mal-list li{font-size:.86rem;margin:4px 0;line-height:1.35}
  .snap-row{display:flex;align-items:center;gap:10px;margin:6px 0}
  .snap-p{font-size:.82rem;width:135px;flex:0 0 135px}
  .snap-row.hi .snap-p{font-weight:700;color:var(--orange-deep)}
  .snap-track{flex:1;height:12px;background:var(--paper-2);border-radius:6px;overflow:hidden}
  .snap-fill{height:100%;background:var(--ink-soft);border-radius:6px}
  .snap-row.hi .snap-fill{background:var(--orange)}
  .snap-val{font-size:.8rem;font-weight:600;width:48px;flex:0 0 48px;text-align:right}
  .xt{display:flex;align-items:center;gap:10px;margin:5px 0}
  .xt-g{font-size:.82rem;width:140px;flex:0 0 140px}
  .xt-track{flex:1;height:12px;background:var(--paper-2);border-radius:6px;overflow:hidden}
  .xt-fill{height:100%;background:var(--orange);border-radius:6px}
  .xt-v{font-size:.8rem;font-weight:700;width:36px;flex:0 0 36px;text-align:right}
  .tm-title{font-weight:600;font-size:.9rem}
  .tm-note{font-size:.82rem;color:var(--ink-soft)}
  .tm-by{display:block;font-size:.74rem;color:var(--orange-deep);font-weight:600;margin-top:2px}
  .tm-meta{font-size:.72rem;color:var(--ink-soft);white-space:nowrap;text-align:right}
  .tm-hi-wrap{margin-top:10px}
  .tm-hi{display:block;text-decoration:none;color:var(--ink);background:linear-gradient(180deg,var(--orange-soft),var(--paper-2));border:1px solid var(--orange);border-radius:12px;padding:14px 16px;transition:box-shadow .12s}
  .tm-hi:hover{box-shadow:0 6px 18px rgba(242,107,29,.22)}
  .tm-hi-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
  .tm-hi-meta{font-size:.74rem;color:var(--orange-deep);font-weight:600}
  .tm-hi h3{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;margin:2px 0 4px}
  .tm-hi p{font-size:.86rem;color:var(--ink-soft);line-height:1.45}
  @media(max-width:680px){.tm-item{grid-template-columns:1fr;gap:3px}.tm-meta{text-align:left}}

  /* bill list */
  .bill{display:flex;gap:16px;padding:18px 0;border-top:1px solid var(--line)}
  .bill:first-child{border-top:none}
  .bill .yr{font-family:'Fraunces',serif;font-weight:600;color:var(--orange-deep);font-size:.95rem;flex:0 0 86px}
  .bill h3{font-size:1.02rem;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
  .bill p{font-size:.86rem;color:var(--ink-soft)}
  .bill .tags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}

  /* municipality table */
  .muni{border-top:1px solid var(--line);padding:18px 0}
  .muni:first-child{border-top:none}
  .muni-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .muni-head h3{font-family:'Fraunces',serif;font-size:1.18rem;font-weight:600;letter-spacing:-.01em}
  .muni-meta{display:flex;gap:24px;flex-wrap:wrap;margin-top:10px;font-size:.85rem}
  .muni-meta div span{display:block;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:1px}
  .muni-meta div b{font-weight:600}
  .seats{display:inline-flex;gap:3px;vertical-align:middle;margin-left:6px}
  .seat{width:9px;height:14px;border-radius:2px;background:var(--line)}
  .seat.on{background:var(--orange)}
  .note{font-size:.85rem;color:var(--ink-soft);margin-top:10px;background:var(--paper-2);border-radius:10px;padding:10px 12px}
  .aherslur{margin-top:12px;border-left:3px solid var(--orange);background:linear-gradient(135deg,var(--orange-soft),#fff);border-radius:0 12px 12px 0;padding:14px 16px}
  .aherslur .ah-title{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--orange-deep);font-weight:700;margin-bottom:8px}
  .aherslur ul{margin:0;padding-left:18px}
  .aherslur li{font-size:.86rem;margin-bottom:5px}
  .aherslur li:last-child{margin-bottom:0}

  /* chart */
  .bars{display:flex;align-items:flex-end;gap:24px;height:230px;padding:14px 6px 0;border-bottom:2px solid var(--ink)}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .bar{width:62%;max-width:64px;border-radius:8px 8px 0 0;background:linear-gradient(180deg,var(--orange),var(--orange-deep));position:relative;transition:height 1s cubic-bezier(.2,.8,.2,1)}
  .bar .v{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem}
  .bar.q{background:repeating-linear-gradient(45deg,var(--line),var(--line) 6px,#ece2d2 6px,#ece2d2 12px)}
  .bar.q .v{color:var(--ink-soft)}
  .bar-lbl{margin-top:10px;font-size:.8rem;font-weight:600;text-align:center}
  .bar-sub{font-size:.7rem;color:var(--ink-soft)}

  .callout{background:linear-gradient(135deg,var(--orange-soft),#fff);border:1px solid var(--orange-soft);border-radius:16px;padding:20px 22px;margin:8px 0 26px}
  .callout h3{font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;margin-bottom:4px}
  .callout p{font-size:.88rem;color:var(--ink-soft)}

  .src{font-size:.8rem;color:var(--ink-soft);padding:10px 0;border-top:1px solid var(--line);display:flex;gap:12px}
  .src .d{flex:0 0 92px;font-weight:600;color:var(--ink)}
  .src a{color:var(--orange-deep);text-decoration:none;word-break:break-word}
  .src a:hover{text-decoration:underline}
  .src-noref{color:var(--ink);word-break:break-word}

  .disclaimer{font-size:.82rem;color:var(--ink-soft);background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-top:10px}
  footer{border-top:1px solid var(--line);padding:24px 0;font-size:.78rem;color:var(--ink-soft);text-align:center}

  @media print{
    nav.tabs,header.top .btn{display:none}
    section.panel{display:block!important;page-break-inside:avoid}
    body{background:#fff}
  }

      detail:"Nýr meirihluti kynntur í Viðey 27. maí; ný borgarstjórn tók til starfa 2. júní. Hildur Björnsdóttir (D) borgarstjóri, Einar Þorsteinsson (B) formaður borgarráðs. Einar og Björg skipta um embætti 1. júní 2027. 190 verkefni á verkefnalista meirihlutans; endurskoðun samgöngusáttmála meðal forgangsmála."

      coalition:"Sjálfstæðisflokkur (3) · Viðreisn (2) · Samfylking (2) — 7 af 11",
      detail:"Nýr málefnasamningur 2026–2030 undir yfirskriftinni „Frelsi, ábyrgð, velferð og lífsgæði“. Orri Björnsson (D) formaður bæjarráðs; ráðinn utanaðkomandi bæjarstjóri, Þórður Þórarinsson. Viðreisn og Samfylking skipta með sér embætti forseta bæjarstjórnar á kjörtímabilinu. Viðreisn jók fylgi um 5,1 prósentustig.",
      aherslur:[
        "Fjármál og stjórnsýsla: traustur rekstur og lægri skuldir án þjónustuskerðingar, útsvar ekki hækkað og fasteignagjöld ekki umfram verðlag, rekstrar- og stjórnsýsluúttekt og stafræn umbreyting.",
        "Börn og ungmenni: heimagreiðslur og niðurgreiðsla dagforeldra hækkaðar í allt að 230 þús. kr., þak á gjaldskrá dagforeldra og gjaldfrjáls strætó fyrir 18 ára og yngri frá 1. janúar 2027.",
        "Skólar: aukið aðgengi að sérfræðingum, minna álag í leik- og grunnskólum, ný forvarnarstefna og lausn á húsnæðismálum Tónlistarskólans.",

        "Velferð: lífsgæðakjarni eldra fólks við Sólvang, uppbygging hjúkrunarheimila, ný heilsugæslustöð á Völlunum og fjölgun félagslegra íbúða.",
        "Skipulag og húsnæði: fjölbreyttar lóðir og hlutdeildarlánaíbúðir, einfaldari leyfisferli, undirbúningur nýrrar hafnar í Straumsvík og endurskoðun vaxtamarka.",
        "Samgöngur og umhverfi: úrbætur á Flóttamannavegi, endurskoðun samgöngusáttmálans m.t.t. Hafnarfjarðar og fjölgun hjóla- og göngustíga.",
        "Íþróttir og menning: frístundastyrkur hækkaður í 75 þús. kr. frá 1. janúar 2027, íþrótta- og tómstundamiðstöð í Hamranesi og lengri opnunartími sundlauga."

function seatsDots(on, total){
  on = on || 0;
  let h = '<span class="seats">';
  for(let i=0;i<total;i++) h += `<span class="seat ${i<on?'on':''}"></span>`;
  return h+'</span>';
}

function lineChart(S){
  const pts = S.points;
  const W=680,H=300,padL=40,padR=18,padT=26,padB=50;
  const plotW=W-padL-padR, plotH=H-padT-padB, yMin=S.yMin, yMax=S.yMax, step=S.yStep||2;
  const x = i => padL + (pts.length<2?plotW/2:(i/(pts.length-1))*plotW);
  const y = v => padT + (1-(v-yMin)/(yMax-yMin))*plotH;
  let grid='';
  for(let g=yMin; g<=yMax; g+=step){
    const gy=y(g).toFixed(1);
    grid += `<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" class="ch-grid"/><text x="${padL-8}" y="${(+gy+4).toFixed(1)}" class="ch-ylab">${g}%</text>`;
  }
  const lp = pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.v).toFixed(1)}`);
  const linePath='M'+lp.join(' L');
  const areaPath=`M${x(0).toFixed(1)},${y(yMin).toFixed(1)} L`+lp.join(' L')+` L${x(pts.length-1).toFixed(1)},${y(yMin).toFixed(1)} Z`;
  const many = pts.length>10;
  const labelEvery = many ? Math.ceil(pts.length/8) : 1;
  let dots='';
  pts.forEach((p,i)=>{
    const px=x(i).toFixed(1), py=y(p.v).toFixed(1);
    const isLast=i===pts.length-1;
    const showLabel=(i%labelEvery===0)||isLast;
    const showVal=!many||isLast||p.e;
    if(showVal) dots+=`<text x="${px}" y="${(+py-12).toFixed(1)}" class="ch-val">${p.v.toString().replace('.',',')}</text>`;
    dots += p.e
      ? `<rect x="${(+px-5).toFixed(1)}" y="${(+py-5).toFixed(1)}" width="10" height="10" class="ch-pt ch-pt-e" transform="rotate(45 ${px} ${py})"/>`
      : `<circle cx="${px}" cy="${py}" r="${many?3.2:5}" class="ch-pt"/>`;
    if(showLabel) dots+=`<text x="${px}" y="${H-padB+18}" class="ch-xlab">${p.t}</text>`;
    if(showLabel && !many && p.src) dots+=`<text x="${px}" y="${H-padB+32}" class="ch-xsub">${p.e?'Kosningar':p.src.replace('Gallup þjóðarpúls','Gallup')}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" class="ch" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${S.label}">${grid}<path d="${areaPath}" class="ch-area"/><path d="${linePath}" class="ch-line"/>${dots}</svg>`;
}

function render(){
  // tabs
  document.getElementById('tabbar').innerHTML = TABS.map((t,i)=>
    `<button class="tab ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');

  const m = document.getElementById('main');
  m.innerHTML = panelYfirlit()+panelFylgi()+panelSveitarfylgi()+panelRikisstjorn()+panelThingflokkur()+panelThingmal()+panelSveitarMal()+panelSveitir()+panelHeimildir();

  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('p-'+btn.dataset.tab).classList.add('active');
      window.scrollTo({top:0,behavior:'smooth'});
      if(btn.dataset.tab==='fylgi'||btn.dataset.tab==='sveitarfylgi') animateBars();
    });
  });
  animateBars();
}

  const cards = t.members.map(mp=>{
    const init = mp.name.split(' ').slice(0,2).map(w=>w[0]).join('');
    const body = mp.radherra
      ? `<div class="mp-radh">Ráðherra — situr ekki í fastanefndum</div>`
      : `<ul class="nefndir">${mp.nefndir.map(x=>`<li><span>${x.n}</span> <em class="${/formaður/.test(x.h)?'lead':''}">${x.h}</em></li>`).join('')}</ul>`;
    return `<div class="card min">
      <div class="av">${init}</div>
      <div style="flex:1">
        <h3>${mp.name}</h3>
        <div class="role">${mp.hlutverk}</div>
        <p style="font-size:.78rem;margin-top:-2px">${mp.kjordaemi}</p>
        ${body}
      </div>
    </div>`;
  }).join('');
  return `<section class="panel" id="p-thingflokkur">
    <div class="eyebrow">Þingflokkur Viðreisnar</div>
    <h2 class="sec">11 þingmenn á Alþingi</h2>
    <p class="lede">Formaður þingflokks er ${t.formadur} og varaformaður ${t.varaformadur}. Hér eru þingmenn flokksins, kjördæmi þeirra og seta í fastanefndum Alþingis. Ráðherrar sitja ekki í fastanefndum.</p>
    <div class="grid gstat" style="margin-bottom:28px">
      <div class="card stat"><div class="n">15,8%</div><div class="lbl">Kjörfylgi 2024</div><div class="meta">Alþingiskosningar 30. nóv. 2024</div></div>
      <div class="card stat"><div class="n">11</div><div class="lbl">Þingmenn kjörnir</div><div class="meta">Úr 5 árið 2021 — bætti við sig 6</div></div>
      <div class="card stat"><div class="n accent">3.</div><div class="lbl">Stærsti flokkur landsins</div><div class="meta">Á eftir Samfylkingu og Sjálfstæðisflokki</div></div>
    </div>
    <div class="grid g2">${cards}</div>
    <div class="disclaimer" style="margin-top:22px">Daði Már Kristófersson, fjármála- og efnahagsráðherra, er ráðherra utan þings og situr því ekki á Alþingi sem þingmaður. Nefndaskipan getur breyst á kjörtímabilinu; staðfestu á althingi.is.</div>
  </section>`;
}

/* ---- Þingmál ---- */
function panelThingmal(){
  const T = DATA.thingmal157;
  const T6 = DATA.thingmal156;
  const ferill = (nr,thing=157) => `https://www.althingi.is/thingstorf/thingmalalistar-eftir-thingum/ferill/${thing}/${nr}/?ltg=${thing}&mnr=${nr}`;
  const tyLabel = ty => ty==='frv' ? 'Frumvarp' : 'Þingsályktun';
  const groups = T.groups.map(g=>{
    const rows = g.items.map(it=>{
      const note = it.n ? ` <span class="tm-note">(${it.n})</span>` : '';
      const by = it.by ? `<span class="tm-by">${it.by}</span>` : '';
      const cls = it.ty==='frv' ? 'frv' : 'thal';
      return `<a class="tm-item" href="${ferill(it.nr)}" target="_blank" rel="noopener">
        <span class="tm-type tm-${cls}">${tyLabel(it.ty)}</span>
        <span class="tm-main"><span class="tm-title">${it.t}</span>${note}${by}</span>
        <span class="tm-meta">nr. ${it.nr} · ${it.d}</span>
      </a>`;
    }).join('');
    return `<div class="tm-group">
      <div class="tm-ghead"><h3>${g.title}</h3><span class="tm-count">${g.items.length} mál</span></div>
      <div class="tm-gsub">${g.sub}</div>
      <div class="tm-list">${rows}</div>
    </div>`;
  }).join('');
  const total = T.groups.reduce((s,g)=>s+g.items.length,0);

  // 156. þing — samþykkt lög
  const groups6 = T6.groups.map(g=>{
    const rows = g.items.map(it=>{
      const note = it.n ? ` <span class="tm-note">(${it.n})</span>` : '';
      return `<a class="tm-item" href="${it.url}" target="_blank" rel="noopener">
        <span class="tm-type tm-log">Lög ${it.law}</span>
        <span class="tm-main"><span class="tm-title">${it.t}</span>${note}</span>
        <span class="tm-meta">samþykkt 2025</span>
      </a>`;
    }).join('');
    return `<div class="tm-group">
      <div class="tm-ghead"><h3>${g.title}</h3><span class="tm-count">${g.items.length} lög</span></div>
      <div class="tm-gsub">${g.sub}</div>
      <div class="tm-list">${rows}</div>
    </div>`;
  }).join('');
  const total6 = T6.groups.reduce((s,g)=>s+g.items.length,0);

  return `<section class="panel" id="p-thingmal">
    <div class="eyebrow">Þingmál Viðreisnar á Alþingi</div>
    <h2 class="sec">Frumvörp og tillögur · ${T.thing}</h2>
    <p class="lede">${total} þingmál þar sem þingmaður Viðreisnar er 1. flutningsmaður eða málið kemur frá ráðuneyti undir stjórn ráðherra Viðreisnar. Stjórnarfrumvörp endurspegla stefnu ríkisstjórnarinnar í heild en eru lögð fram af viðkomandi ráðherra. Smelltu á mál til að opna feril þess á althingi.is.</p>
    ${groups}
    <div class="disclaimer" style="margin-top:18px">Byggt á málalistum 157. löggjafarþings á althingi.is (lagafrumvörp og þingsályktunartillögur). Listinn nær til mála sem fram voru komin á þinginu og uppfærist ekki sjálfkrafa.</div>

    <div class="tm-thingsep"></div>
    <h2 class="sec" style="margin-top:30px">Samþykkt lög · ${T6.thing}</h2>
    <p class="lede">${total6} lög frá ráðuneytum Viðreisnar sem náðu fram að ganga á fyrsta þingi ríkisstjórnarinnar. Hér eru aðeins talin mál sem urðu að lögum. Smelltu til að opna lagatextann á althingi.is.</p>
    ${groups6}
    <div class="disclaimer" style="margin-top:18px">Byggt á yfirliti yfir samþykkt lög á 156. þingi (althingi.is). Sú síða tilgreinir ekki flutningsmann; flokkun eftir ráðuneyti byggist á efnissviði málanna. Veiðigjaldið (55/2025) og varnarmálalögin (51/2025) eru staðfest sem stjórnarfrumvörp viðkomandi ráðherra Viðreisnar.</div>
  </section>`;
}

/* ---- Sveitarstjórnarmál ---- */
function panelSveitarMal(){
  const S = DATA.sveitarMal;
  const lbl = {"samþykkt":"Samþykkt","lagt fram":"Lagt fram","kynntur":"Kynntur"};
  const groups = S.sveitarfelog.map(sf=>{
    const rows = sf.mal.map(it=>{
      const note = it.n ? ` <span class="tm-note">(${it.n})</span>` : '';
      const sc = it.s==='samþykkt' ? 'sm-ok' : 'sm-pend';
      return `<div class="tm-item sm-item">
        <span class="tm-type ${sc}">${lbl[it.s]||it.s}</span>
        <span class="tm-main"><span class="tm-title">${it.t}</span>${note}</span>
      </div>`;
    }).join('');
    return `<div class="tm-group">
      <div class="tm-ghead"><h3>${sf.name}</h3><span class="tm-count">${sf.fundur}</span></div>
      <div class="tm-gsub">${sf.meiri}</div>
      <div class="sm-roles">${sf.hlutverk}</div>
      <div class="tm-list">${rows}</div>
    </div>`;
  }).join('');
  return `<section class="panel" id="p-sveitarmal">
    <div class="eyebrow">Sveitarstjórnarmál · meirihlutasveitarfélög Viðreisnar</div>
    <h2 class="sec">Samþykkt mál í bæjar- og borgarstjórn</h2>
    <p class="lede">${S.note}</p>
    ${groups}
    <div class="disclaimer" style="margin-top:18px">„Samþykkt" merkir afgreitt í bæjar-/borgarstjórn; „Lagt fram"/„Kynntur" er komið fram en ekki fullafgreitt. Byggt á fyrstu fundum nýrra sveitarstjórna (júní 2026) og málefnasamningum. Listinn uppfærist ekki sjálfkrafa — bætið við jafnóðum og mál eru afgreidd í haust.</div>
  </section>`;
}

/* ---- Sveitarstjórnir ---- */
function panelSveitir(){
  const list = DATA.munis.map(mu=>{
    const sm = statusMeta[mu.status];
    const dots = mu.seats!=null ? seatsDots(mu.seats, mu.total) : '';
    return `<div class="muni">
      <div class="muni-head">
        <h3>${mu.name} ${dots}</h3>
        <span class="badge ${sm.cls}">${sm.txt}</span>
      </div>
      <div class="muni-meta">
        <div><span>Fulltrúar</span><b>${mu.voteNote}</b></div>
        <div><span>Oddviti</span><b>${mu.oddviti}</b></div>
        ${mu.fulltrui2 ? `<div><span>2. fulltrúi</span><b>${mu.fulltrui2}</b></div>` : ''}
        <div><span>Embætti</span><b>${mu.embætti}</b></div>
        <div><span>Meirihluti</span><b>${mu.coalition}</b></div>
      </div>
      <div class="note">${mu.detail}</div>
      ${mu.aherslur && mu.aherslur.length ? `<div class="aherslur"><div class="ah-title">${mu.aherslurTitle || 'Úr málefnasamningi'}</div><ul>${mu.aherslur.map(a=>`<li>${a}</li>`).join('')}</ul></div>` : ''}
    </div>`;
  }).join('');
  const wdays = [{n:"Þriðjudagur",wd:2},{n:"Miðvikudagur",wd:3},{n:"Fimmtudagur",wd:4}];
  const fundHead = `<tr><th class="fund-wk"></th>${wdays.map(d=>`<th>${d.n}</th>`).join('')}</tr>`;
  const fundRows = [1,2,3,4].map(wk=>{
    const cells = wdays.map(d=>{
      const ms = DATA.fundir.filter(f=>f.wd===d.wd && f.weeks.includes(wk)).map(f=>`<span class="fund-chip">${f.name}<span class="fund-time">kl. ${f.timi}</span></span>`);
      return `<td>${ms.length?ms.join(''):'<span class="fund-empty">·</span>'}</td>`;
    }).join('');
    return `<tr><th class="fund-wk">${wk}. vika</th>${cells}</tr>`;
  }).join('');

  const vl = DATA.verkefnalisti;
  const vlTimabil = vl.timabil.map(t=>{
    const pct = Math.round(t.lokid/t.alls*100);
    return `<div class="vl-stat"><div class="lbl">${t.t}</div><div class="pct">${pct}%</div><div class="sub">${t.lokid} af ${t.alls} lokið</div></div>`;
  }).join('');
  const vlFlokkar = vl.flokkar.map(f=>{
    const pct = Math.round(f.lokid/f.alls*100);
    return `<div class="snap-row"><div class="snap-p">${f.t}</div><div class="snap-track"><div class="snap-fill" style="width:${pct}%"></div></div><div class="snap-val">${f.lokid}/${f.alls}</div></div>`;
  }).join('');

  return `<section class="panel" id="p-sveitir">
    <div class="eyebrow">Sveitarstjórnarkosningar · 16. maí 2026</div>
    <h2 class="sec">Staða Viðreisnar í sveitarfélögunum</h2>
    <p class="lede">Sundurliðun eftir þeim átta sveitarfélögum sem þú sinnir. Fjögur eru staðfest hér; fjögur bíða útfyllingar.</p>
    <div class="card">${list}</div>
    <div class="eyebrow" style="margin-top:34px">Fundadagatal</div>
    <h2 class="sec" style="font-size:1.4rem">Bæjar- og borgarstjórnarfundir</h2>
    <p class="lede">Reglulegir fundir eftir viku mánaðar og vikudegi. Miðvikudagar eru þéttsetnastir (fjögur sveitarfélög í 1. viku) og þriðjudagar bera Reykjavík, Kópavog og Akranes.</p>
    <div class="card">
      <div style="overflow-x:auto"><table class="fund-table">
        <thead>${fundHead}</thead>
        <tbody>${fundRows}</tbody>
      </table></div>
      <p class="bar-sub" style="margin-top:12px">Fundartímar eru reglulegir tímar skv. samþykktum/fundarboðum hvers sveitarfélags (geta vikið til). Múlaþing fundar aðeins fyrsta miðvikudag; önnur sveitarfélög funda tvisvar í mánuði. Mánudagar og föstudagar eru fundalausir. Árborg miðar við kl. 17:00 skv. samþykkt — nýlegir fundir hafa þó hafist kl. 16:00.</p>
    </div>
    <div class="eyebrow" style="margin-top:34px">Reykjavík</div>
    <h2 class="sec" style="font-size:1.4rem">Meirihlutasáttmáli — verkefnalisti</h2>
    <p class="lede">Meirihluti Sjálfstæðisflokks, Viðreisnar og Framsóknar (D+C+B) setti fram ${vl.total} verkefni í sáttmála sínum, flokkuð eftir tímalínu. Framvindan er rakin opinberlega; hér er staðan í júní 2026 (${vl.lokid} verkefni þegar lokið).</p>
    <div class="vl-stats">${vlTimabil}</div>
    <div class="card" style="margin-bottom:16px">
      <div class="eyebrow" style="margin-bottom:12px">Verkefni eftir málaflokki</div>
      ${vlFlokkar}
    </div>
    <a class="vl-link" href="${vl.url}" target="_blank" rel="noopener">Skoða verkefnalistann í heild og rauntímastöðu á verkefnalisti.is →</a>
  </section>`;
}

/* ---- Heimildir ---- */
function panelHeimildir(){
  const list = DATA.sources.map(s=>`<div class="src"><div class="d">${s.d}</div>${s.u?`<a href="${s.u}" target="_blank" rel="noopener">${s.t}</a>`:`<span class="src-noref">${s.t}</span>`}</div>`).join('');
  return `<section class="panel" id="p-heimildir">
    <div class="eyebrow">Heimildir &amp; aðferð</div>
    <h2 class="sec">Hvaðan koma tölurnar</h2>
    <p class="lede">Tölurnar koma frá opinberum heimildum og fréttamiðlum, með dagsetningu. Mánaðarmælingar (t.d. Gallup þjóðarpúls) eru almenn tilvísun án einnar slóðar. Mælaborðið er augnabliksmynd — fylgi og embætti breytast.</p>
    <div class="card" style="margin-bottom:18px">${list}</div>
    <div class="disclaimer">
      <b>Aðferð:</b> Fylgistölur eru frá einstökum könnunum tiltekinna fyrirtækja og endurspegla ekki vegið meðaltal. Sveitarstjórnartölur miðast við úrslit 16. maí 2026 og meirihlutamyndanir sem tilkynntar voru síðustu vikuna í maí. Öll átta sveitarfélögin sem hér eru rakin eru staðfest. Uppfærðu <code>DATA</code>-hlutann í skránni til að halda mælaborðinu lifandi.
    </div>
  </section>`;
}

function animateBars(){
  setTimeout(()=>{
    document.querySelectorAll('#p-fylgi .bar').forEach(b=>{
      b.style.height = b.dataset.h+'%';
    });
  },80);
}

render();
</script>
</body>
</html>
